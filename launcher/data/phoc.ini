[core]
# XWayland not needed for PiercingOS — disabling reduces attack surface and startup time
xwayland = false

[output:DSI-1]
# Fairphone 5 (fairphone-fp5): 6.46" OLED, 2340x1080, 90 Hz, 401 PPI
# Scale 2.5 (401 PPI / 160 ≈ 2.51) → ~936x432 logical px
# Output name assumed DSI-1 on mainline — verify with: wlr-randr
scale = 2.5
